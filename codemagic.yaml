workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jamal.studentbehavior

    scripts:
      - name: Get packages
        script: |
          flutter pub get

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.jamal.studentbehavior" --type IOS_APP_STORE --create

      - name: Apply signing to Xcode project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa